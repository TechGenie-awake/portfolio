<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>404 — Gayatri Jaiswal</title>
    <meta name="description" content="Page not found." />
    <meta name="robots" content="noindex" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Syne:wght@600;700;800&display=swap');

      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --black: #0a0a0a;
        --white: #f5f5f5;
        --gray: #888;
        --gray-dim: #444;
        --gray-border: #1a1a1a;
        --font-body: 'Inter', -apple-system, system-ui, sans-serif;
        --font-heading: 'Syne', -apple-system, system-ui, sans-serif;
      }

      body {
        font-family: var(--font-body);
        background: var(--black);
        color: var(--gray);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
        -webkit-font-smoothing: antialiased;
      }

      .wrap {
        width: 100%;
        max-width: 720px;
        text-align: left;
      }

      .label {
        font-size: 13px;
        font-weight: 500;
        color: var(--gray);
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 24px;
      }

      .code {
        font-family: var(--font-heading);
        font-size: clamp(96px, 20vw, 220px);
        font-weight: 800;
        color: var(--white);
        line-height: 1;
        letter-spacing: -8px;
        margin-bottom: 24px;
      }

      .title {
        font-family: var(--font-heading);
        font-size: clamp(28px, 4vw, 44px);
        font-weight: 700;
        color: var(--white);
        letter-spacing: -1px;
        line-height: 1.1;
        margin-bottom: 16px;
      }

      .desc {
        font-size: 16px;
        line-height: 1.7;
        color: var(--gray);
        max-width: 520px;
        margin-bottom: 40px;
      }

      .actions {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 14px 22px;
        border: 1px solid var(--gray-border);
        border-radius: 999px;
        color: var(--gray);
        text-decoration: none;
        font-size: 14px;
        letter-spacing: 0.5px;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .btn:hover {
        color: var(--white);
        border-color: var(--white);
      }

      .btn.primary {
        background: var(--white);
        color: var(--black);
        border-color: var(--white);
      }

      .btn.primary:hover {
        transform: translateX(4px);
      }

      .btn svg {
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .btn:hover svg {
        transform: translateX(4px);
      }

      .sig {
        margin-top: 80px;
        font-size: 12px;
        color: var(--gray-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="label">Error — Lost page</div>
      <div class="code">404</div>
      <h1 class="title">This page wandered off.</h1>
      <p class="desc">
        The link might be broken, or the page may have moved. Either way,
        there's more to see back on the homepage.
      </p>
      <div class="actions">
        <a href="/" class="btn primary">
          <span>Back to home</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12H19M19 12L12 5M19 12L12 19"/>
          </svg>
        </a>
        <a href="/#/work" class="btn">
          <span>See all work</span>
        </a>
      </div>
      <div class="sig">&mdash; G. Jaiswal</div>
    </main>
  </body>
</html>
